<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count & Collect!</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF9800">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Count &amp; Collect">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF8E7;
  --basket-color: #C67B3C;
  --basket-dark: #9E5A24;
  --basket-light: #DDA86A;
  --green: #4CAF50;
  --green-dark: #388E3C;
  --star: #FFD700;
  --text: #3E2723;
  --shadow: rgba(62, 39, 35, 0.15);
  --celebrate: #FF6B6B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

body {
  background:
    radial-gradient(circle at 20% 80%, #FFE0B2 0%, transparent 40%),
    radial-gradient(circle at 80% 20%, #C8E6C9 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, #FFF3E0 0%, transparent 60%),
    var(--bg);
}

/* Floating background shapes */
.bg-shape {
  position: fixed;
  border-radius: 50%;
  opacity: 0.08;
  z-index: 0;
  animation: floatBg 20s ease-in-out infinite;
}
.bg-shape:nth-child(1) { width: 300px; height: 300px; background: #FF9800; top: -50px; left: -80px; }
.bg-shape:nth-child(2) { width: 200px; height: 200px; background: #4CAF50; bottom: -40px; right: -60px; animation-delay: -7s; }
.bg-shape:nth-child(3) { width: 150px; height: 150px; background: #2196F3; top: 30%; right: 5%; animation-delay: -13s; }

@keyframes floatBg {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(20px, -15px) scale(1.05); }
  66% { transform: translate(-10px, 10px) scale(0.95); }
}

#app {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Header */
.header {
  width: 100%;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back-btn {
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: white;
  box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer;
  font-size: 18px;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.back-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 12px var(--shadow);
}

.back-btn:active { transform: scale(0.95); }

.title {
  font-family: 'Baloo 2', cursive;
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.title span {
  background: linear-gradient(135deg, #FF6B6B, #FF9800, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.score-area {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Baloo 2', cursive;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.star-icon {
  font-size: 24px;
  filter: drop-shadow(0 2px 4px rgba(255,215,0,0.4));
  animation: starPulse 2s ease-in-out infinite;
}

@keyframes starPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* Language selector */
.lang-select {
  display: flex;
  align-items: center;
  gap: 4px;
  background: white;
  border-radius: 20px;
  padding: 4px 6px;
  box-shadow: 0 2px 8px var(--shadow);
}

.lang-btn {
  border: none;
  background: none;
  cursor: pointer;
  font-size: 20px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  opacity: 0.45;
}

.lang-btn.active {
  opacity: 1;
  background: #FFF3E0;
  box-shadow: 0 2px 6px rgba(255,152,0,0.25);
  transform: scale(1.1);
}

.lang-btn:not(.active):hover {
  opacity: 0.75;
  transform: scale(1.05);
}

/* Instruction area */
.instruction {
  margin-top: 4px;
  padding: 10px 28px;
  background: white;
  border-radius: 50px;
  box-shadow: 0 4px 20px var(--shadow), 0 0 0 3px rgba(255,152,0,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.instruction:hover {
  transform: scale(1.03);
  box-shadow: 0 6px 24px var(--shadow), 0 0 0 3px rgba(255,152,0,0.2);
}

.instruction:active { transform: scale(0.98); }

.speaker-btn {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #FF9800, #FF6B00);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 8px rgba(255,152,0,0.3);
}

.speaker-btn svg { width: 18px; height: 18px; fill: white; }

.instruction-text {
  font-family: 'Baloo 2', cursive;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

/* Progress dots */
.progress {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #E0D5C1;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.dot.filled {
  background: var(--green);
  transform: scale(1.3);
  box-shadow: 0 0 8px rgba(76,175,80,0.5);
}

/* Items area */
.items-area {
  flex: 1;
  width: 100%;
  max-width: 700px;
  padding: 12px 20px;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  justify-content: center;
  gap: 8px;
  overflow: hidden;
}

.item {
  width: 72px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  background: white;
  border-radius: 18px;
  box-shadow: 0 4px 12px var(--shadow);
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  position: relative;
}

.item:active { cursor: grabbing; }

.item.dragging {
  opacity: 0.5;
  transform: scale(0.9);
}

.item.collected {
  animation: collectPop 0.4s ease forwards;
}

@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes collectPop {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); }
  100% { transform: scale(0); opacity: 0; }
}

/* Basket area */
.basket-zone {
  width: 100%;
  padding: 0 20px 20px;
  display: flex;
  justify-content: center;
}

.basket-container {
  position: relative;
  width: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.basket-counter {
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  min-width: 68px; height: 68px;
  padding: 0 14px;
  box-sizing: border-box;
  white-space: nowrap;
  background: linear-gradient(135deg, #FF6B6B, #EF5350);
  border-radius: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Baloo 2', cursive;
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 800;
  color: white;
  box-shadow: 0 4px 12px rgba(239,83,80,0.4);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.basket-counter.bump {
  animation: counterBump 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes counterBump {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.3); }
  100% { transform: translateX(-50%) scale(1); }
}

.basket {
  width: 260px;
  height: 110px;
  position: relative;
  transition: transform 0.2s;
}

.basket.hover {
  transform: scale(1.05);
}

.basket svg { width: 100%; height: 100%; }

.basket-items {
  position: absolute;
  bottom: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 2px;
  pointer-events: none;
}

.basket-item {
  font-size: 28px;
  animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
}

@keyframes dropIn {
  from { transform: translateY(-30px) scale(0); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* Drop zone visual */
.drop-hint {
  text-align: center;
  margin-top: -4px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #B0A090;
  letter-spacing: 0.5px;
}

/* Celebration overlay */
.celebration {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255, 248, 231, 0.9);
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.celebration.show {
  opacity: 1;
  pointer-events: all;
}

.celebration-emoji {
  font-size: 80px;
  animation: celebBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}

.celebration-text {
  font-family: 'Baloo 2', cursive;
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  margin-top: 8px;
  animation: celebBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
}

.celebration-sub {
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #8D6E63;
  margin-top: 4px;
  animation: celebBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
}

@keyframes celebBounce {
  from { transform: scale(0) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  z-index: 101;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Category selector */
.category-bar {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.cat-btn {
  padding: 6px 16px;
  border: none;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  background: white;
  color: var(--text);
  box-shadow: 0 2px 8px var(--shadow);
}

.cat-btn.active {
  background: linear-gradient(135deg, #FF9800, #FF6B00);
  color: white;
  box-shadow: 0 4px 12px rgba(255,152,0,0.35);
  transform: scale(1.05);
}

.cat-btn:not(.active):hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px var(--shadow);
}

/* Dragging ghost */
.drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  font-size: 52px;
  transform: translate(-50%, -50%) scale(1.1);
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.2));
  transition: transform 0.1s;
}

/* Start screen */
.start-screen {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  background:
    radial-gradient(circle at 30% 70%, #FFE0B2 0%, transparent 40%),
    radial-gradient(circle at 70% 30%, #C8E6C9 0%, transparent 40%),
    var(--bg);
  transition: opacity 0.6s, transform 0.6s;
}

.start-screen.hide {
  opacity: 0;
  transform: scale(1.1);
  pointer-events: none;
}

.start-title {
  font-family: 'Baloo 2', cursive;
  font-size: 52px;
  font-weight: 800;
  text-align: center;
  line-height: 1.1;
  animation: startBounce 2s ease-in-out infinite;
}

.start-title .line1 { color: var(--text); }
.start-title .line2 {
  background: linear-gradient(135deg, #FF6B6B, #FF9800, #FFD700, #4CAF50, #2196F3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@keyframes startBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.start-emojis {
  font-size: 48px;
  margin: 16px 0;
  display: flex;
  gap: 12px;
}

.start-emojis span {
  display: inline-block;
  animation: emojiWave 1.5s ease-in-out infinite;
}

.start-emojis span:nth-child(2) { animation-delay: 0.15s; }
.start-emojis span:nth-child(3) { animation-delay: 0.3s; }
.start-emojis span:nth-child(4) { animation-delay: 0.45s; }
.start-emojis span:nth-child(5) { animation-delay: 0.6s; }

@keyframes emojiWave {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-12px) rotate(-5deg); }
  75% { transform: translateY(4px) rotate(3deg); }
}

/* Start screen language selector */
.start-lang {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.start-lang .lang-btn {
  font-size: 28px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 2px 10px var(--shadow);
  opacity: 0.45;
}

.start-lang .lang-btn.active {
  opacity: 1;
  box-shadow: 0 4px 14px rgba(255,152,0,0.35);
  transform: scale(1.12);
}

.start-btn {
  margin-top: 24px;
  padding: 16px 48px;
  border: none;
  border-radius: 50px;
  font-family: 'Baloo 2', cursive;
  font-size: 26px;
  font-weight: 800;
  color: white;
  background: linear-gradient(135deg, #4CAF50, #388E3C);
  box-shadow: 0 6px 20px rgba(76,175,80,0.4), 0 0 0 4px rgba(76,175,80,0.15);
  cursor: pointer;
  transition: all 0.25s;
}

.start-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(76,175,80,0.45), 0 0 0 4px rgba(76,175,80,0.25);
}

.start-btn:active { transform: translateY(0) scale(0.97); }

/* Mode selection */
.mode-select {
  display: flex;
  gap: 16px;
  margin-top: 20px;
}

.mode-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 18px 28px;
  border: 3px solid transparent;
  border-radius: 24px;
  background: white;
  box-shadow: 0 4px 16px var(--shadow);
  cursor: pointer;
  transition: all 0.25s;
  font-family: 'Nunito', sans-serif;
}

.mode-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px var(--shadow);
}

.mode-btn.active {
  border-color: #FF9800;
  background: #FFF3E0;
  box-shadow: 0 4px 16px rgba(255,152,0,0.3);
  transform: scale(1.05);
}

.mode-icon { font-size: 40px; }
.mode-label {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
}

/* Letter mode styles */
.letter-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 90px;
  padding: 10px 6px;
  background: white;
  border-radius: 18px;
  box-shadow: 0 4px 12px var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}

.letter-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 16px var(--shadow);
}

.letter-item:active { transform: scale(0.93); }

.letter-item .letter-emoji { font-size: 40px; }
.letter-item .letter-name {
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.1;
  word-break: break-word;
}

.letter-item.correct {
  animation: collectPop 0.4s ease forwards;
}

.letter-item.wrong-shake {
  animation: wrongShake 0.5s ease;
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

/* Big letter display at bottom */
.letter-zone {
  width: 100%;
  padding: 0 20px 20px;
  display: flex;
  justify-content: center;
}

.letter-display {
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 30px;
  font-family: 'Baloo 2', cursive;
  font-size: 80px;
  font-weight: 800;
  color: white;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  animation: letterPulse 2s ease-in-out infinite;
}

@keyframes letterPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Responsive */
@media (max-height: 700px) {
  .items-area { padding: 8px 16px; gap: 6px; }
  .item { width: 62px; height: 62px; font-size: 36px; }
  .instruction-text { font-size: 19px; }
  .basket { width: 220px; height: 95px; }
}

@media (max-width: 400px) {
  .title { font-size: 22px; }
  .item { width: 60px; height: 60px; font-size: 34px; }
}
</style>
</head>
<body>

<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<!-- Start Screen -->
<div class="start-screen" id="startScreen">
  <div class="start-lang">
    <button class="lang-btn active" id="startLangEn" onclick="setLang('en')" title="English">&#127468;&#127463;</button>
    <button class="lang-btn" id="startLangDe" onclick="setLang('de')" title="Deutsch">&#127465;&#127466;</button>
  </div>
  <div class="start-title">
    <div class="line1" id="startLine1">Count &</div>
    <div class="line2" id="startLine2">Collect!</div>
  </div>
  <div class="start-emojis">
    <span>&#127822;</span><span>&#128049;</span><span>&#128296;</span><span>&#127820;</span><span>&#128054;</span>
  </div>
  <div class="mode-select" id="modeSelect">
    <button class="mode-btn" id="modeCount" onclick="selectMode('counting')">
      <span class="mode-icon">&#128290;</span>
      <span class="mode-label" id="modeLabelCount">Counting</span>
    </button>
    <button class="mode-btn" id="modeLetters" onclick="selectMode('letters')">
      <span class="mode-icon">&#128260;</span>
      <span class="mode-label" id="modeLabelLetters">Letters</span>
    </button>
  </div>
  <button class="start-btn" id="startBtn">Let's Play!</button>
</div>

<div id="app">
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="backToMenu()" title="Back">&#9664;</button>
    <div class="title" id="appTitle">Count & <span>Collect!</span></div>
    <div class="header-right">
      <div class="lang-select">
        <button class="lang-btn active" id="headerLangEn" onclick="setLang('en')" title="English">&#127468;&#127463;</button>
        <button class="lang-btn" id="headerLangDe" onclick="setLang('de')" title="Deutsch">&#127465;&#127466;</button>
      </div>
      <div class="score-area">
        <span class="star-icon">&#11088;</span>
        <span id="score">0</span>
      </div>
    </div>
  </div>

  <div class="instruction" id="instruction" onclick="speak()">
    <div class="speaker-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>
    <span class="instruction-text" id="instructionText">Tap play to start!</span>
  </div>

  <div class="category-bar" id="categoryBar"></div>
  <div class="progress" id="progress"></div>

  <div class="items-area" id="itemsArea"></div>

  <div class="basket-zone">

const NUMBER_WORDS = {

function numberWord(n) {
  return (NUMBER_WORDS[currentLang] && NUMBER_WORDS[currentLang][n]) || String(n);
}

const CONFETTI_COLORS = ['#FF6B6B', '#FFD700', '#4CAF50', '#2196F3', '#FF9800', '#E91E63', '#9C27B0'];

let currentLang = 'en';
let gameMode = 'counting'; // 'counting' or 'letters'

const LETTER_COLORS = [
  '#FF6B6B', '#FF9800', '#4CAF50', '#2196F3', '#9C27B0',
  '#E91E63', '#00BCD4', '#FF5722', '#8BC34A', '#3F51B5',

let state = {
  category: 'fruits',
  targetNumber: 0,
  collected: 0,
  currentItem: null,
  score: 0,
  round: 0,
  started: false,
  // letter mode state
  targetLetter: '',
  targetWord: null,
  letterItems: [],
};

let dragState = null;
let ghostEl = null;

function t() { return LANG[currentLang]; }

function itemName(item) {
  if (currentLang === 'de') return state.targetNumber === 1 ? item.nameDe : item.pluralDe;
  return state.targetNumber === 1 ? item.name : item.plural;
}

function selectMode(mode) {
  gameMode = mode;
  document.getElementById('modeCount').classList.toggle('active', mode === 'counting');
  document.getElementById('modeLetters').classList.toggle('active', mode === 'letters');
}

function setLang(lang) {
  currentLang = lang;
  // Update all lang buttons
  ['En', 'De'].forEach(l => {
    const lk = l.toLowerCase();
    const startBtn = document.getElementById('startLang' + l);
    const headerBtn = document.getElementById('headerLang' + l);
    if (startBtn) startBtn.classList.toggle('active', lk === lang);
    if (headerBtn) headerBtn.classList.toggle('active', lk === lang);
  });

  // Update static texts
  const L = t();
  document.getElementById('startLine1').innerHTML = L.startLine1;
  document.getElementById('startLine2').innerHTML = L.startLine2;
  document.getElementById('startBtn').textContent = L.startBtn;
  document.getElementById('modeLabelCount').textContent = L.modeCounting;
  document.getElementById('modeLabelLetters').textContent = L.modeLetters;
  updateAppTitle();
  const dropHint = document.getElementById('dropHint');
  if (dropHint) dropHint.innerHTML = L.dropHint;

  if (!state.started) {
    document.getElementById('instructionText').innerHTML = L.tapToStart;
  } else {
    buildCategoryBar();
    if (gameMode === 'counting') {
      updateUI();
    } else {
      updateLetterUI();
    }
    speak();
  }
}

function updateAppTitle() {
  const L = t();
  if (gameMode === 'letters') {
    document.getElementById('appTitle').innerHTML = L.titleMainLetters + '<span>' + L.titleSpanLetters + '</span>';
  } else {
    document.getElementById('appTitle').innerHTML = L.titleMain + '<span>' + L.titleSpan + '</span>';
  }
}

function init() {
  buildCategoryBar();
  selectMode('counting');
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function buildCategoryBar() {
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (key === state.category ? ' active' : '');
    btn.innerHTML = cat.label[currentLang];
    btn.onclick = () => {
      if (key === state.category) return;
      state.category = key;
      buildCategoryBar();
      newRound();
    };
    bar.appendChild(btn);
  });
}

function backToMenu() {
  // Stop any speech
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();

  // Reset state
  state.started = false;
  state.score = 0;
  state.round = 0;
  state.collected = 0;
  state.currentItem = null;
  state.targetLetter = '';
  state.targetWord = null;
  state.letterItems = [];

  // Remove letter zone if it exists
  const lz = document.getElementById('letterZone');
  if (lz) lz.remove();

  // Restore counting-mode elements visibility
  document.querySelector('.basket-zone').style.display = '';
  document.getElementById('categoryBar').style.display = '';
  document.getElementById('progress').style.display = '';

  // Clear items area
  document.getElementById('itemsArea').innerHTML = '';
  document.getElementById('basketItems').innerHTML = '';
  document.getElementById('score').textContent = '0';

  // Show start screen
  const startScreen = document.getElementById('startScreen');
  startScreen.classList.remove('hide');

  // Update texts for current language
  const L = t();
  document.getElementById('instructionText').innerHTML = L.tapToStart;
  document.getElementById('startLine1').innerHTML = L.startLine1;
  document.getElementById('startLine2').innerHTML = L.startLine2;
  document.getElementById('startBtn').textContent = L.startBtn;
}

function startGame() {
  state.started = true;
  document.getElementById('startScreen').classList.add('hide');
  updateAppTitle();

  if (gameMode === 'letters') {
    // Hide counting-specific elements, show letter zone
    document.querySelector('.basket-zone').style.display = 'none';
    document.getElementById('categoryBar').style.display = 'none';
    document.getElementById('progress').style.display = 'none';
    const lz = document.createElement('div');
    lz.className = 'letter-zone';
    lz.id = 'letterZone';
    lz.innerHTML = '<div class="letter-display" id="letterDisplay"></div>';
    document.getElementById('app').appendChild(lz);
  }

  newRound();
}

function newRound() {
  resetCountQueue();
  state.round++;
  state.collected = 0;

  if (gameMode === 'letters') {
    newLetterRound();
    return;
  }

  const cat = CATEGORIES[state.category];
  const item = cat.items[Math.floor(Math.random() * cat.items.length)];
  // avoid same item twice in a row
  if (state.currentItem && item.name === state.currentItem.name && cat.items.length > 1) {
    return newRound();
  }
  state.currentItem = item;

  // Target: 1-5 for first 3 rounds, then 1-10
  const maxTarget = state.round <= 3 ? 5 : 10;
  state.targetNumber = Math.floor(Math.random() * maxTarget) + 1;

  updateUI();
  speak();
}

function getAllItems() {
  const all = [];
  Object.values(CATEGORIES).forEach(cat => {
    cat.items.forEach(item => all.push(item));
  });
  return all;
}

function getItemFirstLetter(item) {
  const name = currentLang === 'de' ? item.nameDe : item.name;
  return name.charAt(0).toUpperCase();
}

function getItemDisplayName(item) {
  return currentLang === 'de' ? item.nameDe : item.name;
}

function newLetterRound() {
  const allItems = getAllItems();

  // Group items by first letter
  const byLetter = {};
  allItems.forEach(item => {
    const letter = getItemFirstLetter(item);
    if (!byLetter[letter]) byLetter[letter] = [];
    byLetter[letter].push(item);
  });

  // Pick a letter that has at least 1 item, avoid same letter twice
  const availableLetters = Object.keys(byLetter).filter(l => l !== state.targetLetter);
  const targetLetter = availableLetters[Math.floor(Math.random() * availableLetters.length)];
  state.targetLetter = targetLetter;

  // Pick the target item (correct answer)
  const correctItems = byLetter[targetLetter];
  const targetItem = correctItems[Math.floor(Math.random() * correctItems.length)];
  state.targetWord = targetItem;

  // Pick distractors: items with different first letters
  const distractors = allItems.filter(i => getItemFirstLetter(i) !== targetLetter);
  // Shuffle and pick 4-6 distractors
  const shuffled = distractors.sort(() => Math.random() - 0.5);
  const numDistractors = Math.min(Math.floor(Math.random() * 3) + 4, shuffled.length);
  const chosen = shuffled.slice(0, numDistractors);

  // Combine and shuffle
  state.letterItems = [targetItem, ...chosen].sort(() => Math.random() - 0.5);

  updateLetterUI();
  speak();
}

function updateLetterUI() {
  const L = t();
  const letter = state.targetLetter;

  // Update instruction
  document.getElementById('instructionText').textContent = L.getLetterInstruction(letter);
  document.getElementById('score').textContent = state.score;

  // Update big letter display
  const display = document.getElementById('letterDisplay');
  if (display) {
    display.textContent = letter;
    const colorIdx = (letter.charCodeAt(0) - 65) % LETTER_COLORS.length;
    display.style.background = `linear-gradient(135deg, ${LETTER_COLORS[colorIdx]}, ${LETTER_COLORS[(colorIdx + 5) % LETTER_COLORS.length]})`;
  }

  // Render items with labels
  const area = document.getElementById('itemsArea');
  area.innerHTML = '';

  state.letterItems.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'letter-item';
    el.style.animationDelay = `${idx * 0.06}s`;

    const emojiSpan = document.createElement('span');
    emojiSpan.className = 'letter-emoji';
    emojiSpan.innerHTML = item.emoji;

    const nameSpan = document.createElement('span');
    nameSpan.className = 'letter-name';
    nameSpan.textContent = getItemDisplayName(item);

    el.appendChild(emojiSpan);
    el.appendChild(nameSpan);

    el.addEventListener('click', () => onLetterItemClick(el, item));

    area.appendChild(el);
  });
}

function onLetterItemClick(el, item) {
  if (el.classList.contains('correct')) return;

  const isCorrect = getItemFirstLetter(item) === state.targetLetter;

  if (isCorrect) {
    el.classList.add('correct');
    state.score += 10;
    document.getElementById('score').textContent = state.score;
    playPop();
    setTimeout(() => celebrateLetter(), 500);
  } else {
    el.classList.add('wrong-shake');
    shakeBasketSound();
    speakWrong();
    setTimeout(() => el.classList.remove('wrong-shake'), 500);
  }
}

function shakeBasketSound() {
  // Just play the wrong feedback without shaking the basket (not visible in letter mode)
}

async function celebrateLetter() {
  const L = t();
  const c = L.celebrations[Math.floor(Math.random() * L.celebrations.length)];
  document.getElementById('celebEmoji').innerHTML = c.emoji;
  document.getElementById('celebText').innerHTML = c.text;
  document.getElementById('celebSub').innerHTML = L.youFoundLetter(state.targetLetter);

  const cel = document.getElementById('celebration');
  cel.classList.add('show');

  spawnConfetti();

  const phrases = L.letterCelebSpeech(state.targetLetter, getItemDisplayName(state.targetWord));
  const speechDone = say(phrases[Math.floor(Math.random() * phrases.length)]);
  const animDone = new Promise(r => setTimeout(r, 2400));
  await Promise.all([speechDone, animDone]);

  cel.classList.remove('show');
  newRound();
}

function updateUI() {
  const item = state.currentItem;
  const target = state.targetNumber;
  const name = itemName(item);

  document.getElementById('instructionText').textContent = t().getInstruction(target, name, item.genderDe);
  document.getElementById('score').textContent = state.score;
  document.getElementById('basketCounter').textContent = `${state.collected} / ${target}`;
  document.getElementById('basketItems').innerHTML = '';

  // Progress dots
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  for (let i = 0; i < target; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i < state.collected ? ' filled' : '');
    prog.appendChild(dot);
  }

  // Render items - show more than target so there's a choice
  const totalItems = Math.min(target + Math.floor(Math.random() * 4) + 3, 14);
  const area = document.getElementById('itemsArea');
  area.innerHTML = '';

  // Create a mix: target items + some distractors
  const distractors = CATEGORIES[state.category].items.filter(i => i.name !== item.name);
  const itemsToShow = [];

  for (let i = 0; i < totalItems; i++) {
    if (i < target + 2) {
      itemsToShow.push({ ...item, isTarget: true });
    } else {
      const d = distractors[Math.floor(Math.random() * distractors.length)];
      itemsToShow.push({ ...d, isTarget: false });
    }
  }

  // Shuffle
  for (let i = itemsToShow.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [itemsToShow[i], itemsToShow[j]] = [itemsToShow[j], itemsToShow[i]];
  }

  itemsToShow.forEach((obj, idx) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = obj.emoji;
    el.style.animationDelay = `${idx * 0.04}s`;
    el.dataset.isTarget = obj.isTarget;
    el.dataset.idx = idx;

    // Touch events
    el.addEventListener('touchstart', onDragStart, { passive: false });
    el.addEventListener('mousedown', onDragStart);

    area.appendChild(el);
  });
}

function collectItem(el) {
  const isTarget = el.dataset.isTarget === 'true';
  const emoji = el.innerHTML;

  if (isTarget) {
    el.classList.add('collected');
    setTimeout(() => el.style.visibility = 'hidden', 400);

    state.collected++;

    const basketItems = document.getElementById('basketItems');
    const bi = document.createElement('span');
    bi.className = 'basket-item';
    bi.innerHTML = emoji;
    basketItems.appendChild(bi);

    const counter = document.getElementById('basketCounter');
    counter.textContent = `${state.collected} / ${state.targetNumber}`;
    counter.classList.remove('bump');
    void counter.offsetWidth;
    counter.classList.add('bump');

    const dots = document.querySelectorAll('.dot');
    dots.forEach((d, i) => {
      d.classList.toggle('filled', i < state.collected);
    });

    playPop();

    if (state.collected < state.targetNumber) {
      sayCount(state.collected);
    } else {
      // Queue the final number, then celebrate after all counts are spoken
      sayCount(state.collected, () => setTimeout(() => celebrate(), 300));
      return;
    }
  } else {
    shakeBasket();
    speakWrong();
  }
}

function onDragStart(e) {
  e.preventDefault();
  const el = e.currentTarget;
  const isTouch = e.type === 'touchstart';
  const point = isTouch ? e.touches[0] : e;
  const startX = point.clientX;
  const startY = point.clientY;
  let hasMoved = false;

  el.classList.add('dragging');

  // Create ghost
  ghostEl = document.createElement('div');
  ghostEl.className = 'drag-ghost';
  ghostEl.innerHTML = el.innerHTML;
  ghostEl.style.left = point.clientX + 'px';
  ghostEl.style.top = point.clientY + 'px';
  document.body.appendChild(ghostEl);

  dragState = {
    el,
    isTarget: el.dataset.isTarget === 'true',
    emoji: el.innerHTML,
  };

  const moveEvent = isTouch ? 'touchmove' : 'mousemove';
  const endEvent = isTouch ? 'touchend' : 'mouseup';

  const onMove = (ev) => {
    const p = ev.touches ? ev.touches[0] : ev;
    const dx = p.clientX - startX;
    const dy = p.clientY - startY;
    if (!hasMoved && (dx * dx + dy * dy) > 100) hasMoved = true;

    ghostEl.style.left = p.clientX + 'px';
    ghostEl.style.top = p.clientY + 'px';

    // Check basket hover
    const basket = document.getElementById('basket');
    const rect = basket.getBoundingClientRect();
    const isOver = p.clientX >= rect.left && p.clientX <= rect.right &&
                   p.clientY >= rect.top && p.clientY <= rect.bottom;
    basket.classList.toggle('hover', isOver);
  };

  const onEnd = (ev) => {
    document.removeEventListener(moveEvent, onMove);
    document.removeEventListener(endEvent, onEnd);

    el.classList.remove('dragging');
    document.getElementById('basket').classList.remove('hover');

    if (ghostEl) {
      ghostEl.remove();
      ghostEl = null;
    }

    if (!hasMoved) {
      // Simple click/tap — collect directly
      collectItem(el);
    } else {
      // Drag — check if dropped on basket
      const p = ev.changedTouches ? ev.changedTouches[0] : ev;
      const basket = document.getElementById('basket');
      const rect = basket.getBoundingClientRect();
      const isOver = p.clientX >= rect.left && p.clientX <= rect.right &&
                     p.clientY >= rect.top - 30 && p.clientY <= rect.bottom + 20;

      if (isOver) {
        collectItem(el);
      }
    }

    dragState = null;
  };

  document.addEventListener(moveEvent, onMove, { passive: false });
  document.addEventListener(endEvent, onEnd);
}

function shakeBasket() {
  const basket = document.getElementById('basket');
  basket.style.animation = 'none';
  void basket.offsetWidth;
  basket.style.animation = 'shake 0.4s ease';
  setTimeout(() => basket.style.animation = '', 500);
}

// Add shake keyframes dynamically
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
`;
document.head.appendChild(shakeStyle);

async function celebrate() {
  state.score += state.targetNumber;
  document.getElementById('score').textContent = state.score;

  const L = t();
  const c = L.celebrations[Math.floor(Math.random() * L.celebrations.length)];
  document.getElementById('celebEmoji').innerHTML = c.emoji;
  document.getElementById('celebText').innerHTML = c.text;
  document.getElementById('celebSub').innerHTML = L.youCounted(state.targetNumber);

  const cel = document.getElementById('celebration');
  cel.classList.add('show');

  spawnConfetti();

  // Wait for speech to finish, but at least 2.4s for the animation
  const speechDone = speakCelebration();
  const animDone = new Promise(r => setTimeout(r, 2400));
  await Promise.all([speechDone, animDone]);

  cel.classList.remove('show');
  newRound();
}

function spawnConfetti() {
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

/* ---- Speech Synthesis ---- */
function speak() {
  if (gameMode === 'letters') {
    if (!state.targetLetter) return;
    say(t().getLetterInstruction(state.targetLetter));
    return;
  }
  if (!state.currentItem) return;
  const name = itemName(state.currentItem);
  say(t().getInstruction(state.targetNumber, name, state.currentItem.genderDe));
}

function speakWrong() {
  const phrases = t().wrong;
  say(phrases[Math.floor(Math.random() * phrases.length)]);
}

function speakCelebration() {
  const phrases = t().celebSpeech(state.targetNumber);
  return say(phrases[Math.floor(Math.random() * phrases.length)]);
}

function pickVoice(voices, lang) {
  const langVoices = voices.filter(v => v.lang.startsWith(lang));
  if (!langVoices.length) return null;

  // 1) Siri voices (iOS/macOS — most natural)
  const siri = langVoices.find(v => /siri/i.test(v.name));
  if (siri) return siri;

  // 2) Premium/Enhanced voices (iOS/macOS)
  const premium = langVoices.find(v => /premium/i.test(v.name));
  if (premium) return premium;
  const enhanced = langVoices.find(v => /enhanced/i.test(v.name));
  if (enhanced) return enhanced;

  // 3) Natural/Neural voices (Windows 11, Edge)
  const natural = langVoices.find(v => /natural|neural|online/i.test(v.name));
  if (natural) return natural;

  // 4) Known high-quality voices by name
  if (lang === 'de') {
    return langVoices.find(v => /Anna|Petra|Helena|Katja|Amala|Ingrid/i.test(v.name)) ||
           langVoices.find(v => /Google/i.test(v.name)) ||
           langVoices[0];
  }
  return langVoices.find(v => /Samantha|Karen|Daniel|Moira|Jenny|Aria/i.test(v.name)) ||
         langVoices.find(v => /Google/i.test(v.name)) ||
         langVoices[0];
}

function say(text, cancelPrevious = true) {
  if (!('speechSynthesis' in window)) return Promise.resolve();
  if (cancelPrevious) window.speechSynthesis.cancel();
  return new Promise(resolve => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.volume = 1;
    utter.onend = resolve;
    utter.onerror = resolve;

    const voices = window.speechSynthesis.getVoices();
    const lang = currentLang === 'de' ? 'de' : 'en';
    utter.lang = currentLang === 'de' ? 'de-DE' : 'en-US';
    const voice = pickVoice(voices, lang);
    if (voice) utter.voice = voice;

    // iOS/Safari voices sound better with slightly different tuning
    const isApple = /iPhone|iPad|Mac/i.test(navigator.userAgent);
    utter.rate = isApple ? 1.0 : 0.9;
    utter.pitch = isApple ? 1.2 : 1.1;

    window.speechSynthesis.speak(utter);
  });
}

// Counting speech: queues ALL numbers, speaks them back-to-back, speeds up if queue grows
let _countQueue = [];
let _countSpeaking = false;
let _countDoneCallback = null;

function sayCount(number, onAllDone) {
  if (!('speechSynthesis' in window)) {
    if (onAllDone) onAllDone();
    return;
  }
  _countQueue.push(number);
  if (onAllDone) _countDoneCallback = onAllDone;
  if (!_countSpeaking) _drainCountQueue();
}

function _drainCountQueue() {
  if (_countQueue.length === 0) {
    _countSpeaking = false;
    if (_countDoneCallback) { const cb = _countDoneCallback; _countDoneCallback = null; cb(); }
    return;
  }
  _countSpeaking = true;
  const num = _countQueue.shift();
  const text = numberWord(num);
  const utter = new SpeechSynthesisUtterance(text);
  utter.volume = 1;

  const voices = window.speechSynthesis.getVoices();
  const lang = currentLang === 'de' ? 'de' : 'en';
  utter.lang = currentLang === 'de' ? 'de-DE' : 'en-US';
  const voice = pickVoice(voices, lang);
  if (voice) utter.voice = voice;

  const isApple = /iPhone|iPad|Mac/i.test(navigator.userAgent);
  utter.rate = 1.2;
  utter.pitch = isApple ? 1.2 : 1.1;

  utter.onend = () => _drainCountQueue();
  utter.onerror = () => _drainCountQueue();
  window.speechSynthesis.speak(utter);
}

function resetCountQueue() {
  _countQueue = [];
  _countSpeaking = false;
  _countDoneCallback = null;
}

// Preload voices
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  speechSynthesis.getVoices();
}

/* ---- Audio feedback ---- */
function playPop() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}
